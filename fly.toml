app = "mets-hrs"
primary_region = "ewr"

[build]

[env]
  POLL_INTERVAL = "30"
  LOG_LEVEL = "INFO"
  DATA_DIR = "/data"

[[mounts]]
  source = "abs_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
