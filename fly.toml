# fly.toml — Fly.io deployment config for MLB Pitch Challenge Bot
# Run `fly launch` to create your app, then `fly deploy` to deploy.

app = "mets-hrs"
primary_region = "ewr"

[build]

[env]
  POLL_INTERVAL = "30"
  LOG_LEVEL = "INFO"

# No HTTP service needed — this is a pure background worker
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
